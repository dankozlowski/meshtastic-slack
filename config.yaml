# Meshtastic settings
serial_port: null  # null = auto-detect first Meshtastic device
mesh_channel: 0    # Meshtastic channel index (0 = primary)

# Slack settings
slack_channel_id: "C07XXXXXX"  # Replace with your Slack channel ID

# Message formatting
message_prefix: "[Mesh]"
max_mesh_message_len: 220

# Behavior
ignore_own_messages: true

# Logging
log_level: INFO
log_file: null  # null = stdout only; set a path for file logging
